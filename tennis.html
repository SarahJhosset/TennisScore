<!DOCTYPE html>
<html xml:lang="es">
  <head>
    <title>Tennis Score Counter</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 50px auto;
        text-align: center;
        background-color: #f0f0f0;
      }
      h1 {
        color: #2c3e50;
      }
      .scoreboard {
        background-color: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        margin: 20px 0;
      }
      .score {
        font-size: 48px;
        font-weight: bold;
        color: #27ae60;
        margin: 20px 0;
      }
      .buttons {
        display: flex;
        justify-content: space-around;
        margin-top: 30px;
      }
      button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s;
      }
      .player1-btn {
        background-color: #3498db;
        color: white;
      }
      .player1-btn:hover {
        background-color: #2980b9;
      }
      .player2-btn {
        background-color: #e74c3c;
        color: white;
      }
      .player2-btn:hover {
        background-color: #c0392b;
      }
      .reset-btn {
        background-color: #95a5a6;
        color: white;
        margin-top: 20px;
      }
      .reset-btn:hover {
        background-color: #7f8c8d;
      }
    </style>
  </head>
  <body>
    <h1>🎾 Tennis Score Counter</h1>
    
    <div class="scoreboard">
      <h2>Score</h2>
      <div class="score" id="score-display">Love - Love</div>
    </div>

    <div class="buttons">
      <button class="player1-btn" id="player1-button">
        Player 1 Scores
      </button>
      <button class="player2-btn" id="player2-button">
        Player 2 Scores
      </button>
    </div>

    <button class="reset-btn" id="reset-button">Reset Game</button>

    <script type="module" src="./src/tennisPresenter.js"></script>
  </body>
</html>
